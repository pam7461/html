<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>표(table)</title>
</head>
<body>
    <h1>표(table)</h1>
    <table border="1">
        <tr>
            <td>1-1</td>
            <td rowspan="2">1-2</td>
        </tr>
        <tr>
            <td>2-1</td>            
        </tr>
        <tr>
            <td colspan="2">3-1</td>
        </tr>
    </table>


    <table border="1">
        <tr>
            <td rowspan="2">1-1</td>
            <td>1-2</td>
            <td>1-3</td>
        </tr>
        <tr>
            <td>2-2</td>
            <td>2-3</td>
        </tr>
        <tr>
            <td>3-1</td>
            <td rowspan="2" colspan="2">3-2</td>
        </tr>
        <tr>
            <td>4-1</td>
        </tr>
        <tr>
            <td>5-1</td>
            <td>5-2</td>
            <td>5-3</td>
        </tr>
    </table>

</body>
</html>
