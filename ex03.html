<!DOCTYPE html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>연습03</title>
    </head>
    <body>
        <!-- 백그라운드 변경/컬러변경 -->
        <div style="
            width:100px;
            height:30px;            
            border:#000000 2px solid;
            font-family:'Noto Sans KR';
            font-weight:600;
            font-size:16px;            
            text-align:center;
            line-height:30px;
            background-color:#000000;
            color:#ffffff;
        " onclick="
            this.style.color='#000000';
            this.style.backgroundColor='#ffffff';
        ">로그인</div>
    </body>
</html>
