<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing:border-box;
            margin: 0;
            padding: 0;
        }
       table,tr,td{
        border:1px solid #000000;
        border-collapse:collapse;
       } 
       td{
        width:200px;
       }
    </style>
</head>
<body>
    <!-- 5X3 테이블 -->
    <table>
        <tr>
            <td colspan="3">1</td>            
        </tr>
        <tr>
            <td>1</td>
            <td>2</td>
            <td>3</td>
        </tr>
        <tr>
            <td>1</td>
            <td rowspan="3" colspan="2">2</td>            
        </tr>
        <tr>
            <td>1</td>
        </tr>
        <tr>
            <td>1</td>
        </tr>
    </table>
</body>
</html>
